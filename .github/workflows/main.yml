on:
  pull_request:
    paths:
    - '**.csv'

name: flexdash

jobs:
  flexdash:
    runs-on: ubuntu-16.04
    steps:
      - uses: actions/checkout@v2
      - uses: r-lib/actions/setup-r@master
      - uses: r-lib/actions/setup-pandoc@master
      
      - name: Cache R Packages
        uses: actions/cache@v1
        with:
          path: ${{ env.R_LIBS_USER }}
          key:  r-${{ hashFiles('DESCRIPTION') }}

      - name: Install R Packages
        run: |
          Rscript -e 'pkgs = c("readr", "leaflet", "flexdashboard", "rmarkdown"); if(length(new.pkgs <- setdiff(pkgs, rownames(installed.packages())))) install.packages(new.pkgs)'
      
      - name: Render Rmarkdown
        run: |
          Rscript -e "rmarkdown::render('index.Rmd')"
      - name: commit
        env:
         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "{{ github.actor }}"
          git checkout "${GITHUB_REF}"
          git add .
          git commit -m 'Re-build index.Rmd' || echo "No changes to commit"
          git push -u https://x-access-token:${{secrets.DEPLOY_PAT}}@github.com/${{github.repository}}.git HEAD:${{GITHUB_REF}} || echo "No changes to commit"
   
