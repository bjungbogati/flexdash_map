on:
  push:
    branches:
      - master

name: flexdash

jobs:
  flexdash:
    runs-on: ubuntu-16.04
    steps:
      - uses: actions/checkout@v2-beta
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: r-lib/actions/setup-r@master
      - uses: r-lib/actions/setup-pandoc@master
      
      - name: Cache R Packages
        uses: actions/cache@v1
        with:
          path: ${{ env.R_LIBS_USER }}
          key:  r-${{ hashFiles('DESCRIPTION') }}

      - name: Install R Packages
        run: |
          Rscript -e 'install.packages(c("readr", "htmlwidgets", "magrittr", "leaflet", "flexdashboard", "rmarkdown", dependencies = TRUE))'
      
      - name: Render Rmarkdown
        run: |
          Rscript -e "rmarkdown::render('index.Rmd')"
      - name: commit
        env:
         GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "{{ github.actor }}"
          git add .
          git commit -m 'Re-build README.Rmd' || echo "No changes to commit"
          git push -f https://${{github.actor}}:${{secrets.GITHUB_TOKEN}}@github.com/${{github.repository}}.git HEAD:${GITHUB_REF} || echo "No changes to commit"
