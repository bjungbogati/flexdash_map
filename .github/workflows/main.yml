on:
  pull_request:
    branches:
      - master

name: flexdash

jobs:
  flexdash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: r-lib/actions/setup-r@master
      - uses: r-lib/actions/setup-pandoc@v1
      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("readr", "leaflet", "flexdashboard", "rmarkdown"))'
      - name: Run R script
        run: |
          Rscript -e "rmarkdown::render("index.Rmd", "flex_dashboard")"
